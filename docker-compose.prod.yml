version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ciliai-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    restart: always
    networks:
      - ciliai-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  backend:
    build:
      context: ./ciliAI
      dockerfile: Dockerfile
    container_name: ciliai-backend
    ports:
      - "${BACKEND_PORT}:5001"
    env_file:
      - .env
    environment:
      DB_TYPE: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      FLASK_DEBUG: "False"
      FLASK_PORT: 5001
      VOLC_AK: ${VOLC_AK}
      VOLC_SK: ${VOLC_SK}
    volumes:
      - ./ciliAI/uploads:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    restart: always
    networks:
      - ciliai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./ciliAI
      dockerfile: Dockerfile.frontend
    container_name: ciliai-frontend
    ports:
      - "${FRONTEND_PORT}:3003"
    environment:
      VITE_API_BASE_URL: http://backend:${BACKEND_PORT}
      VITE_ADMIN_BASE_URL: http://admin:${ADMIN_PORT}
    depends_on:
      - backend
    restart: always
    networks:
      - ciliai-network

  admin:
    build:
      context: ./ruoyi
      dockerfile: Dockerfile
    container_name: ciliai-admin
    ports:
      - "${ADMIN_PORT}:80"
    environment:
      VITE_API_BASE_URL: http://backend:${BACKEND_PORT}
    depends_on:
      - backend
    restart: always
    networks:
      - ciliai-network

networks:
  ciliai-network:
    driver: bridge

volumes:
  mysql_data:
  backend_logs:
