<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CiliAI - 后台管理系统</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css">
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus/dist/index.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus/dist/locale/zh-cn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #app { height: 100%; font-family: 'Microsoft YaHei', sans-serif; }
    .login-container { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .login-box { width: 400px; padding: 40px; background: #fff; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    .login-header { text-align: center; margin-bottom: 30px; }
    .login-header h1 { font-size: 32px; color: #333; margin-bottom: 8px; }
    .login-header p { font-size: 14px; color: #999; }
    .login-btn { width: 100%; }
    .login-tip { text-align: center; margin-top: 20px; font-size: 12px; color: #999; }
    .layout-container { height: 100vh; }
    .layout-aside { background-color: #1d1e1f; overflow: hidden; }
    .logo { height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 1px solid #333; }
    .logo-text { font-size: 22px; font-weight: bold; color: #fff; }
    .logo-sub { font-size: 12px; color: #999; }
    .el-menu { border-right: none; }
    .layout-header { background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .page-title { font-size: 18px; font-weight: 500; }
    .user-info { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .layout-main { background: #f5f7fa; padding: 20px; }
    .stat-card { display: flex; align-items: center; padding: 20px; }
    .stat-card .el-card__body { display: flex; align-items: center; width: 100%; }
    .stat-icon { width: 60px; height: 60px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-right: 16px; color: #fff; font-size: 24px; }
    .stat-icon.user { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .stat-icon.project { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
    .stat-icon.code { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
    .stat-icon.used { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
    .stat-info { flex: 1; }
    .stat-value { font-size: 28px; font-weight: 600; color: #333; }
    .stat-label { font-size: 14px; color: #999; margin-top: 4px; }
    .quick-actions { display: flex; gap: 12px; }
    .system-info { display: flex; flex-direction: column; gap: 12px; }
    .info-item { display: flex; align-items: center; }
    .info-label { width: 100px; color: #666; }
    .info-value { color: #333; }
    .card-header { display: flex; justify-content: space-between; align-items: center; }
    .header-actions { display: flex; gap: 10px; }
    .el-form-item__tip { font-size: 12px; color: #909399; margin-top: 4px; }
    .batch-tip { font-size: 12px; color: #909399; padding: 8px 12px; background: #f5f7fa; border-radius: 4px; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="app">
    <template v-if="!isLoggedIn">
      <div class="login-container">
        <div class="login-box">
          <div class="login-header">
            <h1>磁力AI</h1>
            <p>后台管理系统</p>
          </div>
          <el-form :model="loginForm" label-width="0">
            <el-form-item>
              <el-input v-model="loginForm.username" placeholder="用户名" size="large" prefix-icon="User"></el-input>
            </el-form-item>
            <el-form-item>
              <el-input v-model="loginForm.password" type="password" placeholder="密码" size="large" prefix-icon="Lock" show-password @keyup.enter="handleLogin"></el-input>
            </el-form-item>
            <el-form-item>
              <el-button type="primary" size="large" class="login-btn" :loading="loading" @click="handleLogin">登录</el-button>
            </el-form-item>
          </el-form>
          <div class="login-tip">默认账号：admin / admin123</div>
        </div>
      </div>
    </template>

    <template v-else>
      <el-container class="layout-container">
        <el-aside width="220px" class="layout-aside">
          <div class="logo">
            <span class="logo-text">CiliAI</span>
            <span class="logo-sub">后台管理</span>
          </div>
          <el-menu :default-active="activeMenu" background-color="#1d1e1f" text-color="#bfcbd9" active-text-color="#409eff" @select="handleMenuSelect">
            <el-menu-item index="dashboard">
              <el-icon><el-icon-odometer></el-icon-odometer></el-icon>
              <span>控制台</span>
            </el-menu-item>
            <el-menu-item index="codes">
              <el-icon><el-icon-ticket></el-icon-ticket></el-icon>
              <span>邀请码管理</span>
            </el-menu-item>
            <el-menu-item index="works">
              <el-icon><el-icon-picture></el-icon-picture></el-icon>
              <span>内容管理</span>
            </el-menu-item>
            <el-menu-item index="users">
              <el-icon><el-icon-user></el-icon-user></el-icon>
              <span>用户管理</span>
            </el-menu-item>
          </el-menu>
        </el-aside>
        <el-container>
          <el-header class="layout-header">
            <div class="header-left">
              <span class="page-title">{{ pageTitle }}</span>
            </div>
            <div class="header-right">
              <el-dropdown @command="handleCommand">
                <span class="user-info">
                  <el-icon><el-icon-user-filled></el-icon-user-filled></el-icon>
                  <span>{{ username }}</span>
                </span>
                <template #dropdown>
                  <el-dropdown-menu>
                    <el-dropdown-item command="logout">退出登录</el-dropdown-item>
                  </el-dropdown-menu>
                </template>
              </el-dropdown>
            </div>
          </el-header>
          <el-main class="layout-main">
            <!-- 控制台 -->
            <template v-if="activeMenu === 'dashboard'">
              <el-row :gutter="20">
                <el-col :span="6" v-for="(stat, index) in stats" :key="index">
                  <el-card shadow="hover" class="stat-card">
                    <div class="stat-icon" :class="stat.type">
                      <span>{{ stat.icon }}</span>
                    </div>
                    <div class="stat-info">
                      <div class="stat-value">{{ stat.value }}</div>
                      <div class="stat-label">{{ stat.label }}</div>
                    </div>
                  </el-card>
                </el-col>
              </el-row>
              <el-row :gutter="20" style="margin-top: 20px;">
                <el-col :span="12">
                  <el-card shadow="hover">
                    <template #header><span>快捷操作</span></template>
                    <div class="quick-actions">
                      <el-button type="primary" @click="activeMenu = 'codes'">创建邀请码</el-button>
                      <el-button type="success" @click="activeMenu = 'works'">上传作品</el-button>
                      <el-button type="warning" @click="activeMenu = 'users'">查看用户</el-button>
                    </div>
                  </el-card>
                </el-col>
                <el-col :span="12">
                  <el-card shadow="hover">
                    <template #header><span>系统信息</span></template>
                    <div class="system-info">
                      <div class="info-item"><span class="info-label">系统版本：</span><span class="info-value">v1.0.0</span></div>
                      <div class="info-item"><span class="info-label">技术框架：</span><span class="info-value">Vue 3 + Element Plus</span></div>
                      <div class="info-item"><span class="info-label">后端框架：</span><span class="info-value">Flask + SQLite</span></div>
                      <div class="info-item"><span class="info-label">API服务：</span><span class="info-value">火山引擎</span></div>
                    </div>
                  </el-card>
                </el-col>
              </el-row>
            </template>

            <!-- 邀请码管理 -->
            <template v-else-if="activeMenu === 'codes'">
              <el-card shadow="never">
                <template #header>
                  <div class="card-header">
                    <span>邀请码列表</span>
                    <div class="header-actions">
                      <el-button type="primary" @click="showBatchDialog = true">批量生成</el-button>
                      <el-button type="success" @click="showCreateCodeDialog">新建邀请码</el-button>
                    </div>
                  </div>
                </template>
                <el-table :data="inviteCodes" v-loading="tableLoading" stripe>
                  <el-table-column prop="id" label="ID" width="80"></el-table-column>
                  <el-table-column prop="code" label="邀请码" min-width="150"></el-table-column>
                  <el-table-column prop="compute_power" label="算力值" width="100"></el-table-column>
                  <el-table-column prop="status" label="状态" width="100">
                    <template #default="{ row }">
                      <el-tag :type="row.status === 'active' ? 'success' : row.status === 'used' ? 'info' : 'danger'">
                        {{ row.status === 'active' ? '未使用' : row.status === 'used' ? '已使用' : '已禁用' }}
                      </el-tag>
                    </template>
                  </el-table-column>
                  <el-table-column prop="use_count" label="使用次数" width="100"></el-table-column>
                  <el-table-column prop="created_at" label="创建时间" width="180"></el-table-column>
                  <el-table-column label="操作" width="150" fixed="right">
                    <template #default="{ row }">
                      <el-button link type="primary" @click="editCode(row)">编辑</el-button>
                      <el-button link type="danger" @click="deleteCode(row)">删除</el-button>
                    </template>
                  </el-table-column>
                </el-table>
              </el-card>
            </template>

            <!-- 内容管理 -->
            <template v-else-if="activeMenu === 'works'">
              <el-card shadow="never">
                <template #header>
                  <div class="card-header">
                    <span>社区分享内容管理</span>
                    <el-button type="primary" @click="showCreateWorkDialog">上传作品</el-button>
                  </div>
                </template>
                <el-table :data="works" v-loading="tableLoading" stripe>
                  <el-table-column prop="id" label="ID" width="80"></el-table-column>
                  <el-table-column label="封面" width="120">
                    <template #default="{ row }">
                      <el-image :src="row.image" style="width: 80px; height: 60px;" fit="cover"></el-image>
                    </template>
                  </el-table-column>
                  <el-table-column prop="title" label="作品名称" min-width="150"></el-table-column>
                  <el-table-column prop="student_name" label="学员名称" width="120"></el-table-column>
                  <el-table-column prop="cost" label="算力成本" width="120"></el-table-column>
                  <el-table-column prop="duration" label="制作时长" width="100"></el-table-column>
                  <el-table-column prop="category" label="分类" width="100">
                    <template #default="{ row }">
                      <el-tag :type="row.category === 'IP版权库' ? 'primary' : 'success'" size="small">
                        {{ row.category || 'IP版权库' }}
                      </el-tag>
                    </template>
                  </el-table-column>
                  <el-table-column prop="status" label="状态" width="80">
                    <template #default="{ row }">
                      <el-tag :type="row.status === 'active' ? 'success' : 'danger'">
                        {{ row.status === 'active' ? '已发布' : '已下架' }}
                      </el-tag>
                    </template>
                  </el-table-column>
                  <el-table-column label="操作" width="200" fixed="right">
                    <template #default="{ row }">
                      <el-button link type="primary" @click="editWork(row)">编辑</el-button>
                      <el-button link type="warning" @click="toggleWorkStatus(row)">{{ row.status === 'active' ? '下架' : '发布' }}</el-button>
                      <el-button link type="danger" @click="deleteWork(row)">删除</el-button>
                    </template>
                  </el-table-column>
                </el-table>
              </el-card>
            </template>

            <!-- 用户管理 -->
            <template v-else-if="activeMenu === 'users'">
              <el-card shadow="never">
                <template #header><span>用户管理</span></template>
                <el-table :data="users" v-loading="tableLoading" stripe>
                  <el-table-column prop="id" label="ID" width="80"></el-table-column>
                  <el-table-column prop="invite_code" label="邀请码" min-width="150"></el-table-column>
                  <el-table-column prop="compute_power" label="剩余算力" width="120"></el-table-column>
                  <el-table-column prop="project_count" label="项目数量" width="100"></el-table-column>
                  <el-table-column prop="record_count" label="生成记录" width="100"></el-table-column>
                  <el-table-column prop="created_at" label="注册时间" width="180"></el-table-column>
                  <el-table-column label="操作" width="150" fixed="right">
                    <template #default="{ row }">
                      <el-button link type="primary" @click="viewUserDetail(row)">详情</el-button>
                      <el-button link type="warning" @click="addUserPower(row)">充值算力</el-button>
                    </template>
                  </el-table-column>
                </el-table>
              </el-card>
            </template>
          </el-main>
        </el-container>
      </el-container>
    </template>

    <!-- 创建邀请码对话框 -->
    <el-dialog v-model="createCodeDialogVisible" :title="editingCode ? '编辑邀请码' : '新建邀请码'" width="450px">
      <el-form :model="codeForm" label-width="80px">
        <el-form-item label="邀请码">
          <el-input v-model="codeForm.code" placeholder="留空则自动生成随机邀请码" :disabled="!!editingCode" maxlength="8" show-word-limit></el-input>
          <div class="el-form-item__tip" v-if="!editingCode">邀请码为8位大写字母和数字组合</div>
        </el-form-item>
        <el-form-item label="算力值">
          <el-input-number v-model="codeForm.compute_power" :min="0" :max="10000"></el-input-number>
        </el-form-item>
        <el-form-item label="状态" v-if="editingCode">
          <el-select v-model="codeForm.status">
            <el-option label="未使用" value="active"></el-option>
            <el-option label="已使用" value="used"></el-option>
            <el-option label="已禁用" value="disabled"></el-option>
          </el-select>
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="createCodeDialogVisible = false">取消</el-button>
        <el-button type="primary" @click="submitCodeForm">确定</el-button>
      </template>
    </el-dialog>

    <!-- 批量生成对话框 -->
    <el-dialog v-model="showBatchDialog" title="批量生成邀请码" width="450px">
      <el-form :model="batchForm" label-width="80px">
        <el-form-item label="生成数量">
          <el-input-number v-model="batchForm.count" :min="1" :max="100"></el-input-number>
        </el-form-item>
        <el-form-item label="算力值">
          <el-input-number v-model="batchForm.compute_power" :min="0" :max="10000"></el-input-number>
        </el-form-item>
        <div class="batch-tip">将自动生成随机8位邀请码（大写字母和数字组合）</div>
      </el-form>
      <template #footer>
        <el-button @click="showBatchDialog = false">取消</el-button>
        <el-button type="primary" @click="submitBatchForm">生成</el-button>
      </template>
    </el-dialog>

    <!-- 创建作品对话框 -->
    <el-dialog v-model="createWorkDialogVisible" :title="editingWork ? '编辑作品' : '上传作品'" width="650px">
      <el-form :model="workForm" label-width="100px">
        <el-row :gutter="20">
          <el-col :span="12">
            <el-form-item label="作品名称">
              <el-input v-model="workForm.title" placeholder="请输入作品名称"></el-input>
            </el-form-item>
          </el-col>
          <el-col :span="12">
            <el-form-item label="学员名称">
              <el-input v-model="workForm.student_name" placeholder="请输入学员姓名"></el-input>
            </el-form-item>
          </el-col>
        </el-row>
        <el-form-item label="分类">
          <el-select v-model="workForm.category" placeholder="请选择分类" style="width: 100%;">
            <el-option label="IP版权库" value="IP版权库"></el-option>
            <el-option label="社区分享" value="社区分享"></el-option>
          </el-select>
        </el-form-item>
        <el-form-item label="封面图片">
          <el-input v-model="workForm.image" placeholder="请输入图片URL"></el-input>
        </el-form-item>
        <el-row :gutter="20">
          <el-col :span="12">
            <el-form-item label="算力成本">
              <el-input v-model="workForm.cost" placeholder="如：1000算力/分钟"></el-input>
            </el-form-item>
          </el-col>
          <el-col :span="12">
            <el-form-item label="制作时长">
              <el-input v-model="workForm.duration" placeholder="如：420分钟"></el-input>
            </el-form-item>
          </el-col>
        </el-row>
        <el-row :gutter="20">
          <el-col :span="12">
            <el-form-item label="市场价格">
              <el-input v-model="workForm.price" placeholder="如：150-300元/分钟"></el-input>
            </el-form-item>
          </el-col>
          <el-col :span="12">
            <el-form-item label="版权信息">
              <el-input v-model="workForm.copyright" placeholder="如：归CiliAI所有"></el-input>
            </el-form-item>
          </el-col>
        </el-row>
        <el-form-item label="标签">
          <el-select v-model="workForm.tags" multiple placeholder="请选择标签" style="width: 100%;">
            <el-option label="AI动画" value="AI动画"></el-option>
            <el-option label="AI真人" value="AI真人"></el-option>
            <el-option label="古风" value="古风"></el-option>
            <el-option label="穿越" value="穿越"></el-option>
            <el-option label="现代科幻" value="现代科幻"></el-option>
          </el-select>
        </el-form-item>
        <el-form-item label="作品简介">
          <el-input v-model="workForm.introduction" type="textarea" :rows="4" placeholder="请输入作品简介"></el-input>
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="createWorkDialogVisible = false">取消</el-button>
        <el-button type="primary" @click="submitWorkForm">确定</el-button>
      </template>
    </el-dialog>

    <!-- 用户详情对话框 -->
    <el-dialog v-model="userDetailDialogVisible" title="用户详情" width="600px">
      <el-descriptions :column="2" border>
        <el-descriptions-item label="用户ID">{{ currentUser.id }}</el-descriptions-item>
        <el-descriptions-item label="邀请码">{{ currentUser.invite_code }}</el-descriptions-item>
        <el-descriptions-item label="剩余算力">{{ currentUser.compute_power }}</el-descriptions-item>
        <el-descriptions-item label="项目数量">{{ currentUser.project_count }}</el-descriptions-item>
        <el-descriptions-item label="生成记录">{{ currentUser.record_count }}</el-descriptions-item>
        <el-descriptions-item label="注册时间">{{ currentUser.created_at }}</el-descriptions-item>
      </el-descriptions>
    </el-dialog>

    <!-- 充值算力对话框 -->
    <el-dialog v-model="powerDialogVisible" title="充值算力" width="400px">
      <el-form :model="powerForm" label-width="80px">
        <el-form-item label="当前算力"><span>{{ currentUser.compute_power }}</span></el-form-item>
        <el-form-item label="充值数量">
          <el-input-number v-model="powerForm.amount" :min="1" :max="10000"></el-input-number>
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="powerDialogVisible = false">取消</el-button>
        <el-button type="primary" @click="confirmAddPower">确定</el-button>
      </template>
    </el-dialog>
  </div>

  <script>
    const { createApp, ref, reactive, computed, onMounted } = Vue
    const { ElMessage, ElMessageBox } = ElementPlus

    const app = createApp({
      setup() {
        const isLoggedIn = ref(false)
        const loading = ref(false)
        const tableLoading = ref(false)
        const username = ref('admin')
        const activeMenu = ref('dashboard')

        const loginForm = reactive({ username: '', password: '' })

        const stats = ref([
          { type: 'user', icon: '用户', value: 0, label: '用户总数' },
          { type: 'project', icon: '项目', value: 0, label: '项目总数' },
          { type: 'code', icon: '邀请', value: 0, label: '邀请码总数' },
          { type: 'used', icon: '已用', value: 0, label: '已使用邀请码' }
        ])

        const inviteCodes = ref([])
        const works = ref([])
        const users = ref([])

        const createCodeDialogVisible = ref(false)
        const showBatchDialog = ref(false)
        const createWorkDialogVisible = ref(false)
        const userDetailDialogVisible = ref(false)
        const powerDialogVisible = ref(false)

        const editingCode = ref(null)
        const editingWork = ref(null)
        const currentUser = ref({})

        const codeForm = reactive({ code: '', compute_power: 1000, status: 'active' })
        const batchForm = reactive({ count: 10, compute_power: 1000 })
        const workForm = reactive({ title: '', student_name: '', image: '', cost: '', duration: '', price: '', copyright: '归CiliAI所有', tags: [], introduction: '', category: 'IP版权库' })
        const powerForm = reactive({ amount: 100 })

        const pageTitle = computed(() => {
          const titles = { dashboard: '控制台', codes: '邀请码管理', works: '内容管理', users: '用户管理' }
          return titles[activeMenu.value] || ''
        })

        const handleLogin = async () => {
          if (!loginForm.username || !loginForm.password) {
            ElMessage.warning('请输入用户名和密码')
            return
          }
          loading.value = true
          try {
            const res = await axios.post('/api/admin/login', loginForm)
            if (res.data.code === 200) {
              localStorage.setItem('admin_token', res.data.data.token)
              username.value = res.data.data.username
              isLoggedIn.value = true
              ElMessage.success('登录成功')
              fetchStats()
            } else {
              ElMessage.error(res.data.msg || '登录失败')
            }
          } catch (error) {
            ElMessage.error('登录失败，请重试')
          } finally {
            loading.value = false
          }
        }

        const handleCommand = (command) => {
          if (command === 'logout') {
            ElMessageBox.confirm('确定要退出登录吗？', '提示', { type: 'warning' }).then(() => {
              localStorage.removeItem('admin_token')
              isLoggedIn.value = false
              ElMessage.success('已退出登录')
            }).catch(() => {})
          }
        }

        const handleMenuSelect = (index) => {
          activeMenu.value = index
          if (index === 'codes') fetchInviteCodes()
          else if (index === 'works') fetchWorks()
          else if (index === 'users') fetchUsers()
        }

        const fetchStats = async () => {
          try {
            const res = await axios.get('/api/admin/stats')
            if (res.data.code === 200) {
              stats.value[0].value = res.data.data.userCount
              stats.value[1].value = res.data.data.projectCount
              stats.value[2].value = res.data.data.codeCount
              stats.value[3].value = res.data.data.usedCodeCount
            }
          } catch (error) { console.error(error) }
        }

        const fetchInviteCodes = async () => {
          tableLoading.value = true
          try {
            const res = await axios.get('/api/admin/invite-codes')
            if (res.data.code === 200) inviteCodes.value = res.data.data.list
          } catch (error) { ElMessage.error('获取邀请码列表失败') }
          finally { tableLoading.value = false }
        }

        const fetchWorks = async () => {
          tableLoading.value = true
          try {
            const res = await axios.get('/api/admin/works')
            if (res.data.code === 200) works.value = res.data.data.list
          } catch (error) { ElMessage.error('获取作品列表失败') }
          finally { tableLoading.value = false }
        }

        const fetchUsers = async () => {
          tableLoading.value = true
          try {
            const res = await axios.get('/api/admin/users')
            if (res.data.code === 200) users.value = res.data.data.list
          } catch (error) { ElMessage.error('获取用户列表失败') }
          finally { tableLoading.value = false }
        }

        const showCreateCodeDialog = () => {
          editingCode.value = null
          codeForm.code = ''
          codeForm.compute_power = 1000
          codeForm.status = 'active'
          createCodeDialogVisible.value = true
        }

        const editCode = (row) => {
          editingCode.value = row
          codeForm.code = row.code
          codeForm.compute_power = row.compute_power
          codeForm.status = row.status
          createCodeDialogVisible.value = true
        }

        const deleteCode = async (row) => {
          try {
            await ElMessageBox.confirm('确定要删除该邀请码吗？', '提示', { type: 'warning' })
            const res = await axios.delete(`/api/admin/invite-codes/${row.id}`)
            if (res.data.code === 200) { ElMessage.success('删除成功'); fetchInviteCodes() }
            else ElMessage.error(res.data.msg || '删除失败')
          } catch (error) { if (error !== 'cancel') ElMessage.error('删除失败') }
        }

        const submitCodeForm = async () => {
          try {
            let res
            if (editingCode.value) res = await axios.put(`/api/admin/invite-codes/${editingCode.value.id}`, codeForm)
            else res = await axios.post('/api/admin/invite-codes', codeForm)
            if (res.data.code === 200) { ElMessage.success(editingCode.value ? '更新成功' : '创建成功'); createCodeDialogVisible.value = false; fetchInviteCodes() }
            else ElMessage.error(res.data.msg || '操作失败')
          } catch (error) { ElMessage.error('操作失败') }
        }

        const submitBatchForm = async () => {
          try {
            const res = await axios.post('/api/admin/invite-codes/batch', batchForm)
            if (res.data.code === 200) { ElMessage.success(res.data.msg); showBatchDialog.value = false; fetchInviteCodes() }
            else ElMessage.error(res.data.msg || '批量生成失败')
          } catch (error) { ElMessage.error('批量生成失败') }
        }

        const showCreateWorkDialog = () => {
          editingWork.value = null
          Object.assign(workForm, { title: '', student_name: '', image: '', cost: '', duration: '', price: '', copyright: '归CiliAI所有', tags: [], introduction: '', category: 'IP版权库' })
          createWorkDialogVisible.value = true
        }

        const editWork = (row) => {
          editingWork.value = row
          Object.assign(workForm, { title: row.title, student_name: row.student_name, image: row.image, cost: row.cost, duration: row.duration, price: row.price, copyright: row.copyright, tags: row.tags ? JSON.parse(row.tags) : [], introduction: row.introduction, category: row.category })
          createWorkDialogVisible.value = true
        }

        const toggleWorkStatus = async (row) => {
          const newStatus = row.status === 'active' ? 'inactive' : 'active'
          try {
            const res = await axios.put(`/api/admin/works/${row.id}`, { status: newStatus })
            if (res.data.code === 200) { ElMessage.success(newStatus === 'active' ? '发布成功' : '下架成功'); fetchWorks() }
            else ElMessage.error(res.data.msg || '操作失败')
          } catch (error) { ElMessage.error('操作失败') }
        }

        const deleteWork = async (row) => {
          try {
            await ElMessageBox.confirm('确定要删除该作品吗？', '提示', { type: 'warning' })
            const res = await axios.delete(`/api/admin/works/${row.id}`)
            if (res.data.code === 200) { ElMessage.success('删除成功'); fetchWorks() }
            else ElMessage.error(res.data.msg || '删除失败')
          } catch (error) { if (error !== 'cancel') ElMessage.error('删除失败') }
        }

        const submitWorkForm = async () => {
          try {
            let res
            if (editingWork.value) res = await axios.put(`/api/admin/works/${editingWork.value.id}`, workForm)
            else res = await axios.post('/api/admin/works', workForm)
            if (res.data.code === 200) { ElMessage.success(editingWork.value ? '更新成功' : '创建成功'); createWorkDialogVisible.value = false; fetchWorks() }
            else ElMessage.error(res.data.msg || '操作失败')
          } catch (error) { ElMessage.error('操作失败') }
        }

        const viewUserDetail = (row) => { currentUser.value = row; userDetailDialogVisible.value = true }
        const addUserPower = (row) => { currentUser.value = row; powerForm.amount = 100; powerDialogVisible.value = true }
        const confirmAddPower = () => { ElMessage.success(`已为用户充值${powerForm.amount} 算力`); powerDialogVisible.value = false; fetchUsers() }

        onMounted(() => {
          const token = localStorage.getItem('admin_token')
          if (token) { isLoggedIn.value = true; fetchStats() }
        })

        return {
          isLoggedIn, loading, tableLoading, username, activeMenu, pageTitle,
          loginForm, stats, inviteCodes, works, users,
          createCodeDialogVisible, showBatchDialog, createWorkDialogVisible, userDetailDialogVisible, powerDialogVisible,
          editingCode, editingWork, currentUser,
          codeForm, batchForm, workForm, powerForm,
          handleLogin, handleCommand, handleMenuSelect,
          fetchStats, fetchInviteCodes, fetchWorks, fetchUsers,
          showCreateCodeDialog, editCode, deleteCode, submitCodeForm, submitBatchForm,
          showCreateWorkDialog, editWork, toggleWorkStatus, deleteWork, submitWorkForm,
          viewUserDetail, addUserPower, confirmAddPower
        }
      }
    })

    app.use(ElementPlus, { locale: ElementPlusLocaleZhCn })
    app.mount('#app')
  </script>
</body>
</html>
