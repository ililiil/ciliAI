<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CiliAI - 鍚庡彴绠＄悊绯荤粺</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css">
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus/dist/index.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus/dist/locale/zh-cn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #app { height: 100%; font-family: 'Microsoft YaHei', sans-serif; }
    .login-container { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .login-box { width: 400px; padding: 40px; background: #fff; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    .login-header { text-align: center; margin-bottom: 30px; }
    .login-header h1 { font-size: 32px; color: #333; margin-bottom: 8px; }
    .login-header p { font-size: 14px; color: #999; }
    .login-btn { width: 100%; }
    .login-tip { text-align: center; margin-top: 20px; font-size: 12px; color: #999; }
    .layout-container { height: 100vh; }
    .layout-aside { background-color: #1d1e1f; overflow: hidden; }
    .logo { height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 1px solid #333; }
    .logo-text { font-size: 22px; font-weight: bold; color: #fff; }
    .logo-sub { font-size: 12px; color: #999; }
    .el-menu { border-right: none; }
    .layout-header { background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .page-title { font-size: 18px; font-weight: 500; }
    .user-info { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .layout-main { background: #f5f7fa; padding: 20px; }
    .stat-card { display: flex; align-items: center; padding: 20px; }
    .stat-card .el-card__body { display: flex; align-items: center; width: 100%; }
    .stat-icon { width: 60px; height: 60px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-right: 16px; color: #fff; font-size: 24px; }
    .stat-icon.user { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .stat-icon.project { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
    .stat-icon.code { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
    .stat-icon.used { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
    .stat-info { flex: 1; }
    .stat-value { font-size: 28px; font-weight: 600; color: #333; }
    .stat-label { font-size: 14px; color: #999; margin-top: 4px; }
    .quick-actions { display: flex; gap: 12px; }
    .system-info { display: flex; flex-direction: column; gap: 12px; }
    .info-item { display: flex; align-items: center; }
    .info-label { width: 100px; color: #666; }
    .info-value { color: #333; }
    .card-header { display: flex; justify-content: space-between; align-items: center; }
    .header-actions { display: flex; gap: 10px; }
    .el-form-item__tip { font-size: 12px; color: #909399; margin-top: 4px; }
    .batch-tip { font-size: 12px; color: #909399; padding: 8px 12px; background: #f5f7fa; border-radius: 4px; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="app">
    <template v-if="!isLoggedIn">
      <div class="login-container">
        <div class="login-box">
          <div class="login-header">
            <h1>鏂瑰AI</h1>
            <p>鍚庡彴绠＄悊绯荤粺</p>
          </div>
          <el-form :model="loginForm" label-width="0">
            <el-form-item>
              <el-input v-model="loginForm.username" placeholder="鐢ㄦ埛鍚? size="large" prefix-icon="User"></el-input>
            </el-form-item>
            <el-form-item>
              <el-input v-model="loginForm.password" type="password" placeholder="瀵嗙爜" size="large" prefix-icon="Lock" show-password @keyup.enter="handleLogin"></el-input>
            </el-form-item>
            <el-form-item>
              <el-button type="primary" size="large" class="login-btn" :loading="loading" @click="handleLogin">鐧?褰?/el-button>
            </el-form-item>
          </el-form>
          <div class="login-tip">榛樿璐﹀彿锛歛dmin / admin123</div>
        </div>
      </div>
    </template>

    <template v-else>
      <el-container class="layout-container">
        <el-aside width="220px" class="layout-aside">
          <div class="logo">
            <span class="logo-text">CiliAI</span>
            <span class="logo-sub">鍚庡彴绠＄悊</span>
          </div>
          <el-menu :default-active="activeMenu" background-color="#1d1e1f" text-color="#bfcbd9" active-text-color="#409eff" @select="handleMenuSelect">
            <el-menu-item index="dashboard">
              <el-icon><el-icon-odometer></el-icon-odometer></el-icon>
              <span>鎺у埗鍙?/span>
            </el-menu-item>
            <el-menu-item index="codes">
              <el-icon><el-icon-ticket></el-icon-ticket></el-icon>
              <span>閭€璇风爜绠＄悊</span>
            </el-menu-item>
            <el-menu-item index="works">
              <el-icon><el-icon-picture></el-icon-picture></el-icon>
              <span>鍐呭绠＄悊</span>
            </el-menu-item>
            <el-menu-item index="users">
              <el-icon><el-icon-user></el-icon-user></el-icon>
              <span>鐢ㄦ埛绠＄悊</span>
            </el-menu-item>
          </el-menu>
        </el-aside>
        <el-container>
          <el-header class="layout-header">
            <div class="header-left">
              <span class="page-title">{{ pageTitle }}</span>
            </div>
            <div class="header-right">
              <el-dropdown @command="handleCommand">
                <span class="user-info">
                  <el-icon><el-icon-user-filled></el-icon-user-filled></el-icon>
                  <span>{{ username }}</span>
                </span>
                <template #dropdown>
                  <el-dropdown-menu>
                    <el-dropdown-item command="logout">閫€鍑虹櫥褰?/el-dropdown-item>
                  </el-dropdown-menu>
                </template>
              </el-dropdown>
            </div>
          </el-header>
          <el-main class="layout-main">
            <!-- 鎺у埗鍙?-->
            <template v-if="activeMenu === 'dashboard'">
              <el-row :gutter="20">
                <el-col :span="6" v-for="(stat, index) in stats" :key="index">
                  <el-card shadow="hover" class="stat-card">
                    <div class="stat-icon" :class="stat.type">
                      <span>{{ stat.icon }}</span>
                    </div>
                    <div class="stat-info">
                      <div class="stat-value">{{ stat.value }}</div>
                      <div class="stat-label">{{ stat.label }}</div>
                    </div>
                  </el-card>
                </el-col>
              </el-row>
              <el-row :gutter="20" style="margin-top: 20px;">
                <el-col :span="12">
                  <el-card shadow="hover">
                    <template #header><span>蹇嵎鎿嶄綔</span></template>
                    <div class="quick-actions">
                      <el-button type="primary" @click="activeMenu = 'codes'">鍒涘缓閭€璇风爜</el-button>
                      <el-button type="success" @click="activeMenu = 'works'">涓婁紶浣滃搧</el-button>
                      <el-button type="warning" @click="activeMenu = 'users'">鏌ョ湅鐢ㄦ埛</el-button>
                    </div>
                  </el-card>
                </el-col>
                <el-col :span="12">
                  <el-card shadow="hover">
                    <template #header><span>绯荤粺淇℃伅</span></template>
                    <div class="system-info">
                      <div class="info-item"><span class="info-label">绯荤粺鐗堟湰锛?/span><span class="info-value">v1.0.0</span></div>
                      <div class="info-item"><span class="info-label">鎶€鏈鏋讹細</span><span class="info-value">Vue 3 + Element Plus</span></div>
                      <div class="info-item"><span class="info-label">鍚庣妗嗘灦锛?/span><span class="info-value">Flask + SQLite</span></div>
                      <div class="info-item"><span class="info-label">API鏈嶅姟锛?/span><span class="info-value">鐏北寮曟搸</span></div>
                    </div>
                  </el-card>
                </el-col>
              </el-row>
            </template>

            <!-- 閭€璇风爜绠＄悊 -->
            <template v-else-if="activeMenu === 'codes'">
              <el-card shadow="never">
                <template #header>
                  <div class="card-header">
                    <span>閭€璇风爜鍒楄〃</span>
                    <div class="header-actions">
                      <el-button type="primary" @click="showBatchDialog = true">鎵归噺鐢熸垚</el-button>
                      <el-button type="success" @click="showCreateCodeDialog">鏂板缓閭€璇风爜</el-button>
                    </div>
                  </div>
                </template>
                <el-table :data="inviteCodes" v-loading="tableLoading" stripe>
                  <el-table-column prop="id" label="ID" width="80"></el-table-column>
                  <el-table-column prop="code" label="閭€璇风爜" min-width="150"></el-table-column>
                  <el-table-column prop="compute_power" label="绠楀姏鍊? width="100"></el-table-column>
                  <el-table-column prop="status" label="鐘舵€? width="100">
                    <template #default="{ row }">
                      <el-tag :type="row.status === 'active' ? 'success' : row.status === 'used' ? 'info' : 'danger'">
                        {{ row.status === 'active' ? '鏈娇鐢? : row.status === 'used' ? '宸蹭娇鐢? : '宸茬鐢? }}
                      </el-tag>
                    </template>
                  </el-table-column>
                  <el-table-column prop="use_count" label="浣跨敤娆℃暟" width="100"></el-table-column>
                  <el-table-column prop="created_at" label="鍒涘缓鏃堕棿" width="180"></el-table-column>
                  <el-table-column label="鎿嶄綔" width="150" fixed="right">
                    <template #default="{ row }">
                      <el-button link type="primary" @click="editCode(row)">缂栬緫</el-button>
                      <el-button link type="danger" @click="deleteCode(row)">鍒犻櫎</el-button>
                    </template>
                  </el-table-column>
                </el-table>
              </el-card>
            </template>

            <!-- 鍐呭绠＄悊 -->
            <template v-else-if="activeMenu === 'works'">
              <el-card shadow="never">
                <template #header>
                  <div class="card-header">
                    <span>绀惧尯鍒嗕韩鍐呭绠＄悊</span>
                    <el-button type="primary" @click="showCreateWorkDialog">涓婁紶浣滃搧</el-button>
                  </div>
                </template>
                <el-table :data="works" v-loading="tableLoading" stripe>
                  <el-table-column prop="id" label="ID" width="80"></el-table-column>
                  <el-table-column label="灏侀潰" width="120">
                    <template #default="{ row }">
                      <el-image :src="row.image" style="width: 80px; height: 60px;" fit="cover"></el-image>
                    </template>
                  </el-table-column>
                  <el-table-column prop="title" label="浣滃搧鍚嶇О" min-width="150"></el-table-column>
                  <el-table-column prop="student_name" label="瀛﹀憳鍚嶇О" width="120"></el-table-column>
                  <el-table-column prop="cost" label="绠楀姏鎴愭湰" width="120"></el-table-column>
                  <el-table-column prop="duration" label="鍒朵綔鏃堕暱" width="100"></el-table-column>
                  <el-table-column prop="status" label="鐘舵€? width="80">
                    <template #default="{ row }">
                      <el-tag :type="row.status === 'active' ? 'success' : 'danger'">
                        {{ row.status === 'active' ? '宸插彂甯? : '宸蹭笅鏋? }}
                      </el-tag>
                    </template>
                  </el-table-column>
                  <el-table-column label="鎿嶄綔" width="200" fixed="right">
                    <template #default="{ row }">
                      <el-button link type="primary" @click="editWork(row)">缂栬緫</el-button>
                      <el-button link type="warning" @click="toggleWorkStatus(row)">{{ row.status === 'active' ? '涓嬫灦' : '鍙戝竷' }}</el-button>
                      <el-button link type="danger" @click="deleteWork(row)">鍒犻櫎</el-button>
                    </template>
                  </el-table-column>
                </el-table>
              </el-card>
            </template>

            <!-- 鐢ㄦ埛绠＄悊 -->
            <template v-else-if="activeMenu === 'users'">
              <el-card shadow="never">
                <template #header><span>鐢ㄦ埛绠＄悊</span></template>
                <el-table :data="users" v-loading="tableLoading" stripe>
                  <el-table-column prop="id" label="ID" width="80"></el-table-column>
                  <el-table-column prop="invite_code" label="閭€璇风爜" min-width="150"></el-table-column>
                  <el-table-column prop="compute_power" label="鍓╀綑绠楀姏" width="120"></el-table-column>
                  <el-table-column prop="project_count" label="椤圭洰鏁伴噺" width="100"></el-table-column>
                  <el-table-column prop="record_count" label="鐢熸垚璁板綍" width="100"></el-table-column>
                  <el-table-column prop="created_at" label="娉ㄥ唽鏃堕棿" width="180"></el-table-column>
                  <el-table-column label="鎿嶄綔" width="150" fixed="right">
                    <template #default="{ row }">
                      <el-button link type="primary" @click="viewUserDetail(row)">璇︽儏</el-button>
                      <el-button link type="warning" @click="addUserPower(row)">鍏呭€肩畻鍔?/el-button>
                    </template>
                  </el-table-column>
                </el-table>
              </el-card>
            </template>
          </el-main>
        </el-container>
      </el-container>
    </template>

    <!-- 鍒涘缓閭€璇风爜瀵硅瘽妗?-->
    <el-dialog v-model="createCodeDialogVisible" :title="editingCode ? '缂栬緫閭€璇风爜' : '鏂板缓閭€璇风爜'" width="450px">
      <el-form :model="codeForm" label-width="80px">
        <el-form-item label="閭€璇风爜">
          <el-input v-model="codeForm.code" placeholder="鐣欑┖鍒欒嚜鍔ㄧ敓鎴?浣嶉個璇风爜" :disabled="!!editingCode" maxlength="8" show-word-limit></el-input>
          <div class="el-form-item__tip" v-if="!editingCode">閭€璇风爜涓?浣嶅ぇ鍐欏瓧姣嶅拰鏁板瓧缁勫悎</div>
        </el-form-item>
        <el-form-item label="绠楀姏鍊?>
          <el-input-number v-model="codeForm.compute_power" :min="0" :max="10000"></el-input-number>
        </el-form-item>
        <el-form-item label="鐘舵€? v-if="editingCode">
          <el-select v-model="codeForm.status">
            <el-option label="鏈娇鐢? value="active"></el-option>
            <el-option label="宸蹭娇鐢? value="used"></el-option>
            <el-option label="宸茬鐢? value="disabled"></el-option>
          </el-select>
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="createCodeDialogVisible = false">鍙栨秷</el-button>
        <el-button type="primary" @click="submitCodeForm">纭畾</el-button>
      </template>
    </el-dialog>

    <!-- 鎵归噺鐢熸垚瀵硅瘽妗?-->
    <el-dialog v-model="showBatchDialog" title="鎵归噺鐢熸垚閭€璇风爜" width="450px">
      <el-form :model="batchForm" label-width="80px">
        <el-form-item label="鐢熸垚鏁伴噺">
          <el-input-number v-model="batchForm.count" :min="1" :max="100"></el-input-number>
        </el-form-item>
        <el-form-item label="绠楀姏鍊?>
          <el-input-number v-model="batchForm.compute_power" :min="0" :max="10000"></el-input-number>
        </el-form-item>
        <div class="batch-tip">灏嗚嚜鍔ㄧ敓鎴愰殢鏈?浣嶉個璇风爜锛堝ぇ鍐欏瓧姣?鏁板瓧缁勫悎锛?/div>
      </el-form>
      <template #footer>
        <el-button @click="showBatchDialog = false">鍙栨秷</el-button>
        <el-button type="primary" @click="submitBatchForm">鐢熸垚</el-button>
      </template>
    </el-dialog>

    <!-- 鍒涘缓浣滃搧瀵硅瘽妗?-->
    <el-dialog v-model="createWorkDialogVisible" :title="editingWork ? '缂栬緫浣滃搧' : '涓婁紶浣滃搧'" width="650px">
      <el-form :model="workForm" label-width="100px">
        <el-row :gutter="20">
          <el-col :span="12">
            <el-form-item label="浣滃搧鍚嶇О">
              <el-input v-model="workForm.title" placeholder="璇疯緭鍏ヤ綔鍝佸悕绉?></el-input>
            </el-form-item>
          </el-col>
          <el-col :span="12">
            <el-form-item label="瀛﹀憳鍚嶇О">
              <el-input v-model="workForm.student_name" placeholder="璇疯緭鍏ュ鍛樺悕绉?></el-input>
            </el-form-item>
          </el-col>
        </el-row>
        <el-form-item label="灏侀潰鍥剧墖">
          <el-input v-model="workForm.image" placeholder="璇疯緭鍏ュ浘鐗嘦RL"></el-input>
        </el-form-item>
        <el-row :gutter="20">
          <el-col :span="12">
            <el-form-item label="绠楀姏鎴愭湰">
              <el-input v-model="workForm.cost" placeholder="濡傦細绾?000绠楀姏/鍒嗛挓"></el-input>
            </el-form-item>
          </el-col>
          <el-col :span="12">
            <el-form-item label="鍒朵綔鏃堕暱">
              <el-input v-model="workForm.duration" placeholder="濡傦細420鍒嗛挓"></el-input>
            </el-form-item>
          </el-col>
        </el-row>
        <el-row :gutter="20">
          <el-col :span="12">
            <el-form-item label="甯傚満鍞环">
              <el-input v-model="workForm.price" placeholder="濡傦細150-300鍏?鍒嗛挓"></el-input>
            </el-form-item>
          </el-col>
          <el-col :span="12">
            <el-form-item label="鐗堟潈淇℃伅">
              <el-input v-model="workForm.copyright" placeholder="濡傦細褰扖iliAI鎵€鏈?></el-input>
            </el-form-item>
          </el-col>
        </el-row>
        <el-form-item label="鏍囩">
          <el-select v-model="workForm.tags" multiple placeholder="璇烽€夋嫨鏍囩" style="width: 100%;">
            <el-option label="AI鍔ㄧ敾" value="AI鍔ㄧ敾"></el-option>
            <el-option label="AI鐪熶汉" value="AI鐪熶汉"></el-option>
            <el-option label="浠欎緺" value="浠欎緺"></el-option>
            <el-option label="骞翠唬" value="骞翠唬"></el-option>
            <el-option label="鐜颁唬瑷€鎯? value="鐜颁唬瑷€鎯?></el-option>
          </el-select>
        </el-form-item>
        <el-form-item label="浣滃搧绠€浠?>
          <el-input v-model="workForm.introduction" type="textarea" :rows="4" placeholder="璇疯緭鍏ヤ綔鍝佺畝浠?></el-input>
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="createWorkDialogVisible = false">鍙栨秷</el-button>
        <el-button type="primary" @click="submitWorkForm">纭畾</el-button>
      </template>
    </el-dialog>

    <!-- 鐢ㄦ埛璇︽儏瀵硅瘽妗?-->
    <el-dialog v-model="userDetailDialogVisible" title="鐢ㄦ埛璇︽儏" width="600px">
      <el-descriptions :column="2" border>
        <el-descriptions-item label="鐢ㄦ埛ID">{{ currentUser.id }}</el-descriptions-item>
        <el-descriptions-item label="閭€璇风爜">{{ currentUser.invite_code }}</el-descriptions-item>
        <el-descriptions-item label="鍓╀綑绠楀姏">{{ currentUser.compute_power }}</el-descriptions-item>
        <el-descriptions-item label="椤圭洰鏁伴噺">{{ currentUser.project_count }}</el-descriptions-item>
        <el-descriptions-item label="鐢熸垚璁板綍">{{ currentUser.record_count }}</el-descriptions-item>
        <el-descriptions-item label="娉ㄥ唽鏃堕棿">{{ currentUser.created_at }}</el-descriptions-item>
      </el-descriptions>
    </el-dialog>

    <!-- 鍏呭€肩畻鍔涘璇濇 -->
    <el-dialog v-model="powerDialogVisible" title="鍏呭€肩畻鍔? width="400px">
      <el-form :model="powerForm" label-width="80px">
        <el-form-item label="褰撳墠绠楀姏"><span>{{ currentUser.compute_power }}</span></el-form-item>
        <el-form-item label="鍏呭€兼暟閲?>
          <el-input-number v-model="powerForm.amount" :min="1" :max="10000"></el-input-number>
        </el-form-item>
      </el-form>
      <template #footer>
        <el-button @click="powerDialogVisible = false">鍙栨秷</el-button>
        <el-button type="primary" @click="confirmAddPower">纭畾</el-button>
      </template>
    </el-dialog>
  </div>

  <script>
    const { createApp, ref, reactive, computed, onMounted } = Vue
    const { ElMessage, ElMessageBox } = ElementPlus

    const app = createApp({
      setup() {
        const isLoggedIn = ref(false)
        const loading = ref(false)
        const tableLoading = ref(false)
        const username = ref('admin')
        const activeMenu = ref('dashboard')
        
        const loginForm = reactive({ username: '', password: '' })
        
        const stats = ref([
          { type: 'user', icon: '馃懁', value: 0, label: '鐢ㄦ埛鎬绘暟' },
          { type: 'project', icon: '馃搧', value: 0, label: '椤圭洰鎬绘暟' },
          { type: 'code', icon: '馃帿', value: 0, label: '閭€璇风爜鎬绘暟' },
          { type: 'used', icon: '鉁?, value: 0, label: '宸蹭娇鐢ㄩ個璇风爜' }
        ])

        const inviteCodes = ref([])
        const works = ref([])
        const users = ref([])
        
        const createCodeDialogVisible = ref(false)
        const showBatchDialog = ref(false)
        const createWorkDialogVisible = ref(false)
        const userDetailDialogVisible = ref(false)
        const powerDialogVisible = ref(false)
        
        const editingCode = ref(null)
        const editingWork = ref(null)
        const currentUser = ref({})
        
        const codeForm = reactive({ code: '', compute_power: 1000, status: 'active' })
        const batchForm = reactive({ count: 10, compute_power: 1000 })
        const workForm = reactive({ title: '', student_name: '', image: '', cost: '', duration: '', price: '', copyright: '褰扖iliAI鎵€鏈?, tags: [], introduction: '' })
        const powerForm = reactive({ amount: 100 })

        const pageTitle = computed(() => {
          const titles = { dashboard: '鎺у埗鍙?, codes: '閭€璇风爜绠＄悊', works: '鍐呭绠＄悊', users: '鐢ㄦ埛绠＄悊' }
          return titles[activeMenu.value] || ''
        })

        const handleLogin = async () => {
          if (!loginForm.username || !loginForm.password) {
            ElMessage.warning('璇疯緭鍏ョ敤鎴峰悕鍜屽瘑鐮?)
            return
          }
          loading.value = true
          try {
            const res = await axios.post('/api/admin/login', loginForm)
            if (res.data.code === 200) {
              localStorage.setItem('admin_token', res.data.data.token)
              username.value = res.data.data.username
              isLoggedIn.value = true
              ElMessage.success('鐧诲綍鎴愬姛')
              fetchStats()
            } else {
              ElMessage.error(res.data.msg || '鐧诲綍澶辫触')
            }
          } catch (error) {
            ElMessage.error('鐧诲綍澶辫触锛岃閲嶈瘯')
          } finally {
            loading.value = false
          }
        }

        const handleCommand = (command) => {
          if (command === 'logout') {
            ElMessageBox.confirm('纭畾瑕侀€€鍑虹櫥褰曞悧锛?, '鎻愮ず', { type: 'warning' }).then(() => {
              localStorage.removeItem('admin_token')
              isLoggedIn.value = false
              ElMessage.success('宸查€€鍑虹櫥褰?)
            }).catch(() => {})
          }
        }

        const handleMenuSelect = (index) => {
          activeMenu.value = index
          if (index === 'codes') fetchInviteCodes()
          else if (index === 'works') fetchWorks()
          else if (index === 'users') fetchUsers()
        }

        const fetchStats = async () => {
          try {
            const res = await axios.get('/api/admin/stats')
            if (res.data.code === 200) {
              stats.value[0].value = res.data.data.userCount
              stats.value[1].value = res.data.data.projectCount
              stats.value[2].value = res.data.data.codeCount
              stats.value[3].value = res.data.data.usedCodeCount
            }
          } catch (error) { console.error(error) }
        }

        const fetchInviteCodes = async () => {
          tableLoading.value = true
          try {
            const res = await axios.get('/api/admin/invite-codes')
            if (res.data.code === 200) inviteCodes.value = res.data.data.list
          } catch (error) { ElMessage.error('鑾峰彇閭€璇风爜鍒楄〃澶辫触') }
          finally { tableLoading.value = false }
        }

        const fetchWorks = async () => {
          tableLoading.value = true
          try {
            const res = await axios.get('/api/admin/works')
            if (res.data.code === 200) works.value = res.data.data.list
          } catch (error) { ElMessage.error('鑾峰彇浣滃搧鍒楄〃澶辫触') }
          finally { tableLoading.value = false }
        }

        const fetchUsers = async () => {
          tableLoading.value = true
          try {
            const res = await axios.get('/api/admin/users')
            if (res.data.code === 200) users.value = res.data.data.list
          } catch (error) { ElMessage.error('鑾峰彇鐢ㄦ埛鍒楄〃澶辫触') }
          finally { tableLoading.value = false }
        }

        const showCreateCodeDialog = () => {
          editingCode.value = null
          codeForm.code = ''
          codeForm.compute_power = 1000
          codeForm.status = 'active'
          createCodeDialogVisible.value = true
        }

        const editCode = (row) => {
          editingCode.value = row
          codeForm.code = row.code
          codeForm.compute_power = row.compute_power
          codeForm.status = row.status
          createCodeDialogVisible.value = true
        }

        const deleteCode = async (row) => {
          try {
            await ElMessageBox.confirm('纭畾瑕佸垹闄よ閭€璇风爜鍚楋紵', '鎻愮ず', { type: 'warning' })
            const res = await axios.delete(`/api/admin/invite-codes/${row.id}`)
            if (res.data.code === 200) { ElMessage.success('鍒犻櫎鎴愬姛'); fetchInviteCodes() }
            else ElMessage.error(res.data.msg || '鍒犻櫎澶辫触')
          } catch (error) { if (error !== 'cancel') ElMessage.error('鍒犻櫎澶辫触') }
        }

        const submitCodeForm = async () => {
          try {
            let res
            if (editingCode.value) res = await axios.put(`/api/admin/invite-codes/${editingCode.value.id}`, codeForm)
            else res = await axios.post('/api/admin/invite-codes', codeForm)
            if (res.data.code === 200) { ElMessage.success(editingCode.value ? '鏇存柊鎴愬姛' : '鍒涘缓鎴愬姛'); createCodeDialogVisible.value = false; fetchInviteCodes() }
            else ElMessage.error(res.data.msg || '鎿嶄綔澶辫触')
          } catch (error) { ElMessage.error('鎿嶄綔澶辫触') }
        }

        const submitBatchForm = async () => {
          try {
            const res = await axios.post('/api/admin/invite-codes/batch', batchForm)
            if (res.data.code === 200) { ElMessage.success(res.data.msg); showBatchDialog.value = false; fetchInviteCodes() }
            else ElMessage.error(res.data.msg || '鎵归噺鐢熸垚澶辫触')
          } catch (error) { ElMessage.error('鎵归噺鐢熸垚澶辫触') }
        }

        const showCreateWorkDialog = () => {
          editingWork.value = null
          Object.assign(workForm, { title: '', student_name: '', image: '', cost: '', duration: '', price: '', copyright: '褰扖iliAI鎵€鏈?, tags: [], introduction: '' })
          createWorkDialogVisible.value = true
        }

        const editWork = (row) => {
          editingWork.value = row
          Object.assign(workForm, { title: row.title, student_name: row.student_name, image: row.image, cost: row.cost, duration: row.duration, price: row.price, copyright: row.copyright, tags: row.tags ? JSON.parse(row.tags) : [], introduction: row.introduction })
          createWorkDialogVisible.value = true
        }

        const toggleWorkStatus = async (row) => {
          const newStatus = row.status === 'active' ? 'inactive' : 'active'
          try {
            const res = await axios.put(`/api/admin/works/${row.id}`, { status: newStatus })
            if (res.data.code === 200) { ElMessage.success(newStatus === 'active' ? '鍙戝竷鎴愬姛' : '涓嬫灦鎴愬姛'); fetchWorks() }
            else ElMessage.error(res.data.msg || '鎿嶄綔澶辫触')
          } catch (error) { ElMessage.error('鎿嶄綔澶辫触') }
        }

        const deleteWork = async (row) => {
          try {
            await ElMessageBox.confirm('纭畾瑕佸垹闄よ浣滃搧鍚楋紵', '鎻愮ず', { type: 'warning' })
            const res = await axios.delete(`/api/admin/works/${row.id}`)
            if (res.data.code === 200) { ElMessage.success('鍒犻櫎鎴愬姛'); fetchWorks() }
            else ElMessage.error(res.data.msg || '鍒犻櫎澶辫触')
          } catch (error) { if (error !== 'cancel') ElMessage.error('鍒犻櫎澶辫触') }
        }

        const submitWorkForm = async () => {
          try {
            let res
            if (editingWork.value) res = await axios.put(`/api/admin/works/${editingWork.value.id}`, workForm)
            else res = await axios.post('/api/admin/works', workForm)
            if (res.data.code === 200) { ElMessage.success(editingWork.value ? '鏇存柊鎴愬姛' : '鍒涘缓鎴愬姛'); createWorkDialogVisible.value = false; fetchWorks() }
            else ElMessage.error(res.data.msg || '鎿嶄綔澶辫触')
          } catch (error) { ElMessage.error('鎿嶄綔澶辫触') }
        }

        const viewUserDetail = (row) => { currentUser.value = row; userDetailDialogVisible.value = true }
        const addUserPower = (row) => { currentUser.value = row; powerForm.amount = 100; powerDialogVisible.value = true }
        const confirmAddPower = () => { ElMessage.success(`宸蹭负鐢ㄦ埛鍏呭€?${powerForm.amount} 绠楀姏`); powerDialogVisible.value = false; fetchUsers() }

        onMounted(() => {
          const token = localStorage.getItem('admin_token')
          if (token) { isLoggedIn.value = true; fetchStats() }
        })

        return {
          isLoggedIn, loading, tableLoading, username, activeMenu, pageTitle,
          loginForm, stats, inviteCodes, works, users,
          createCodeDialogVisible, showBatchDialog, createWorkDialogVisible, userDetailDialogVisible, powerDialogVisible,
          editingCode, editingWork, currentUser,
          codeForm, batchForm, workForm, powerForm,
          handleLogin, handleCommand, handleMenuSelect,
          fetchStats, fetchInviteCodes, fetchWorks, fetchUsers,
          showCreateCodeDialog, editCode, deleteCode, submitCodeForm, submitBatchForm,
          showCreateWorkDialog, editWork, toggleWorkStatus, deleteWork, submitWorkForm,
          viewUserDetail, addUserPower, confirmAddPower
        }
      }
    })

    app.use(ElementPlus, { locale: ElementPlusLocaleZhCn })
    app.mount('#app')
  </script>
</body>
</html>
