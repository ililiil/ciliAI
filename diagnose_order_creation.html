<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CiliAI 订单创建诊断</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #FAA943 0%, #FDE7A2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            opacity: 0.95;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #425D5F;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #BACACB;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #FAA943;
            box-shadow: 0 0 0 3px rgba(250, 169, 67, 0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FAA943 0%, #FDE7A2 100%);
            color: #425D5F;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(250, 169, 67, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(250, 169, 67, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }

        .result.success {
            display: block;
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .result.error {
            display: block;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .result h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .result pre {
            background: rgba(0, 0, 0, 0.1);
            padding: 12px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 12px;
            margin-top: 10px;
        }

        .debug-info {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #007bff;
        }

        .debug-info h4 {
            color: #007bff;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .debug-info p {
            margin: 5px 0;
            font-size: 12px;
            color: #666;
            word-break: break-all;
        }

        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }

        .status.success {
            background: #28a745;
            color: white;
        }

        .status.error {
            background: #dc3545;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 CiliAI 订单创建诊断工具</h1>
            <p>直接测试订单创建API，查看详细错误信息</p>
        </div>

        <div class="content">
            <div class="form-group">
                <label>邀请码 (Invite Code)</label>
                <input type="text" id="inviteCode" value="CILIAI88" placeholder="输入邀请码">
            </div>

            <div class="form-group">
                <label>订单标题 *</label>
                <input type="text" id="title" value="诊断测试订单" placeholder="输入订单标题">
            </div>

            <div class="form-group">
                <label>封面图片URL</label>
                <input type="text" id="image" value="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" placeholder="输入图片URL或base64">
            </div>

            <div class="form-group">
                <label>价格</label>
                <input type="text" id="price" value="¥100" placeholder="输入价格">
            </div>

            <div class="form-group">
                <label>描述</label>
                <textarea id="description" rows="3" placeholder="输入描述">诊断测试描述</textarea>
            </div>

            <button class="btn" id="submitBtn" onclick="submitOrder()">
                🚀 测试创建订单
            </button>

            <div class="result" id="result">
                <h3 id="resultTitle"></h3>
                <div id="resultMessage"></div>
                <pre id="resultDetails"></pre>
            </div>

            <div class="debug-info">
                <h4>📊 调试信息</h4>
                <p><strong>API地址:</strong> <span id="apiUrl">http://localhost:5001/api/orders</span></p>
                <p><strong>前端地址:</strong> <span id="frontendUrl"></span></p>
                <p><strong>后端状态:</strong> <span id="backendStatus">检查中...</span></p>
                <p><strong>请求方法:</strong> POST</p>
                <p><strong>Content-Type:</strong> application/json</p>
            </div>
        </div>
    </div>

    <script>
        // 显示前端URL
        document.getElementById('frontendUrl').textContent = window.location.href;

        // 检查后端状态
        async function checkBackend() {
            try {
                const response = await fetch('http://localhost:5001/api/orders', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    document.getElementById('backendStatus').innerHTML =
                        '<span class="status success">✅ 后端正常</span>';
                } else {
                    document.getElementById('backendStatus').innerHTML =
                        '<span class="status error">❌ 后端错误: ' + response.status + '</span>';
                }
            } catch (error) {
                document.getElementById('backendStatus').innerHTML =
                    '<span class="status error">❌ 后端连接失败: ' + error.message + '</span>';
            }
        }

        // 提交订单
        async function submitOrder() {
            const btn = document.getElementById('submitBtn');
            const result = document.getElementById('result');

            btn.disabled = true;
            btn.textContent = '⏳ 提交中...';
            result.className = 'result';
            result.style.display = 'none';

            const orderData = {
                invite_code: document.getElementById('inviteCode').value,
                title: document.getElementById('title').value,
                image: document.getElementById('image').value,
                price: document.getElementById('price').value,
                status: 'recruiting',
                description: document.getElementById('description').value
            };

            console.log('提交订单数据:', orderData);

            try {
                const response = await fetch('http://localhost:5001/api/orders', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(orderData)
                });

                const resultData = await response.json();
                console.log('响应结果:', resultData);

                document.getElementById('resultTitle').textContent =
                    resultData.status === 'success' ? '✅ 订单创建成功!' : '❌ 订单创建失败';

                document.getElementById('resultMessage').innerHTML =
                    resultData.message || '未知消息';

                document.getElementById('resultDetails').textContent =
                    JSON.stringify(resultData, null, 2);

                result.className = 'result ' +
                    (resultData.status === 'success' ? 'success' : 'error');

            } catch (error) {
                console.error('提交失败:', error);

                document.getElementById('resultTitle').textContent = '❌ 请求失败';
                document.getElementById('resultMessage').textContent = error.message;
                document.getElementById('resultDetails').textContent =
                    '错误类型: ' + error.name + '\n错误消息: ' + error.message;

                result.className = 'result error';
            }

            btn.disabled = false;
            btn.textContent = '🚀 测试创建订单';
        }

        // 页面加载时检查后端
        checkBackend();
    </script>
</body>
</html>
