version: '3.8'

services:
  ciliai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ciliai-all-in-one
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${DB_NAME:-ciliai}
      MYSQL_USER: ${DB_USER:-ciliai}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ciliai_password}
      FLASK_PORT: 5001
      ADMIN_PORT: 5002
      FRONTEND_PORT: 3003
    ports:
      - "3306:3306"
      - "5001:5001"
      - "5002:5002"
      - "3003:3003"
    volumes:
      - ciliai_data:/app/data
      - ciliai_uploads:/app/uploads
    networks:
      - ciliai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    mem_limit: 4g
    cpus: 2

networks:
  ciliai-network:
    driver: bridge
    name: ciliai-simple-network

volumes:
  ciliai_data:
    name: ciliai-data-volume
  ciliai_uploads:
    name: ciliai-uploads-volume
