version: '3'
services:
  jimeng-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ciliai-backend
    ports:
      - "5001:5001"
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - ciliai-network

networks:
  ciliai-network:
    name: fangtang_ciliai-network
    external: true
