<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dify API 测试工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            color: #555;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .response-section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }

        .response-section h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
        }

        .response-box {
            background: #282c34;
            color: #abb2bf;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .status-success {
            background: #10b981;
            color: white;
        }

        .status-error {
            background: #ef4444;
            color: white;
        }

        .status-pending {
            background: #f59e0b;
            color: white;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            font-size: 14px;
            color: #1565c0;
        }

        .quick-select {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .quick-select button {
            padding: 8px 16px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .quick-select button:hover,
        .quick-select button.active {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 Dify API 测试工具</h1>
            <p>用于测试 Dify 对话接口是否正常工作</p>
        </div>

        <div class="content">
            <div class="info-box">
                <strong>💡 使用说明：</strong>
                <ul style="margin-top: 8px; padding-left: 20px;">
                    <li>填写 API 密钥（已自动填充）</li>
                    <li>选择角色（people 参数）</li>
                    <li>输入测试消息</li>
                    <li>点击"发送测试"按钮</li>
                    <li>查看右侧响应结果</li>
                </ul>
            </div>

            <div class="section">
                <div class="section-title">📡 API 配置</div>

                <div class="form-group">
                    <label>API 基础 URL</label>
                    <input type="text" id="apiUrl" value="https://whhongyi.com.cn/v1/chat-messages" readonly>
                </div>

                <div class="form-group">
                    <label>API 密钥</label>
                    <input type="text" id="apiKey" value="app-jd05GWziMofrIu8sX7FFfLd2">
                </div>

                <div class="form-group">
                    <label>选择角色（people 参数）</label>
                    <div class="quick-select">
                        <button type="button" class="active" onclick="selectPeople('1', this)">📝 剧本设计 (1)</button>
                        <button type="button" onclick="selectPeople('2', this)">👤 人设设计 (2)</button>
                        <button type="button" onclick="selectPeople('3', this)">🎬 场景设计 (3)</button>
                    </div>
                    <input type="hidden" id="peopleValue" value="1">
                </div>

                <div class="form-group">
                    <label>用户标识</label>
                    <input type="text" id="userId" value="test-user-001">
                </div>
            </div>

            <div class="section">
                <div class="section-title">💬 测试消息</div>

                <div class="form-group">
                    <label>输入查询内容</label>
                    <textarea id="query" placeholder="请输入测试消息...">你好，请简单介绍一下自己</textarea>
                </div>

                <button class="btn btn-primary" id="sendBtn" onclick="sendRequest()">
                    <span>🚀</span>
                    <span id="btnText">发送测试</span>
                </button>
            </div>

            <div class="response-section">
                <h3>📥 响应结果</h3>
                <div id="statusBadge" class="status-badge status-pending">等待发送请求...</div>
                <div class="response-box" id="responseOutput">响应内容将显示在这里...</div>
            </div>
        </div>
    </div>

    <script>
        let selectedPeople = '1';

        function selectPeople(value, btn) {
            selectedPeople = value;
            document.getElementById('peopleValue').value = value;
            
            // 更新按钮样式
            document.querySelectorAll('.quick-select button').forEach(b => {
                b.classList.remove('active');
            });
            btn.classList.add('active');
            
            log(`已选择角色: ${value}`);
        }

        function log(message) {
            const output = document.getElementById('responseOutput');
            const timestamp = new Date().toLocaleTimeString();
            output.textContent += `\n[${timestamp}] ${message}`;
            output.scrollTop = output.scrollHeight;
        }

        function updateStatus(status, message) {
            const badge = document.getElementById('statusBadge');
            badge.textContent = message;
            badge.className = 'status-badge status-' + status;
        }

        async function sendRequest() {
            const apiUrl = document.getElementById('apiUrl').value;
            const apiKey = document.getElementById('apiKey').value;
            const query = document.getElementById('query').value;
            const userId = document.getElementById('userId').value;
            
            const sendBtn = document.getElementById('sendBtn');
            const btnText = document.getElementById('btnText');
            const output = document.getElementById('responseOutput');
            
            // 清空输出
            output.textContent = '';
            
            // 显示加载状态
            sendBtn.disabled = true;
            btnText.innerHTML = '<span class="loading"></span> 发送中...';
            updateStatus('pending', '正在发送请求...');
            
            log('========== 开始测试 ==========');
            log(`API URL: ${apiUrl}`);
            log(`API Key: ${apiKey.substring(0, 15)}...`);
            log(`People: ${selectedPeople}`);
            log(`Query: ${query}`);
            log(`User: ${userId}`);
            log('==============================\n');
            
            const requestBody = {
                inputs: {
                    people: selectedPeople
                },
                query: query,
                response_mode: 'streaming',
                user: userId,
                files: []
            };
            
            log('请求体:');
            log(JSON.stringify(requestBody, null, 2));
            log('\n==============================\n');
            
            try {
                log('开始发送请求...');
                
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });
                
                log(`\n收到响应!`);
                log(`状态码: ${response.status} ${response.statusText}`);
                log(`Content-Type: ${response.headers.get('content-type')}`);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    log(`\n❌ 请求失败!`);
                    log(`错误信息: ${errorText}`);
                    updateStatus('error', `请求失败 (${response.status})`);
                } else {
                    log(`\n✅ 请求成功，开始处理流式响应...`);
                    updateStatus('success', '请求成功，处理中...');
                    
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let fullResponse = '';
                    
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        
                        const chunk = decoder.decode(value, { stream: true });
                        log(`\n收到数据块: ${chunk}`);
                        
                        const lines = chunk.split('\n');
                        for (const line of lines) {
                            if (line.trim() && line.startsWith('data: ')) {
                                try {
                                    const data = JSON.parse(line.slice(6));
                                    
                                    if (data.event === 'message' || data.event === 'agent_message') {
                                        if (data.answer) {
                                            fullResponse += data.answer;
                                            log(`收到文本: ${data.answer}`);
                                        }
                                    }
                                    
                                    if (data.event === 'message_end') {
                                        log('\n==============================');
                                        log('✅ 流式响应结束');
                                        log(`会话ID: ${data.conversation_id || '无'}`);
                                        log(`完整回复: ${fullResponse}`);
                                        log('==============================');
                                        updateStatus('success', '测试成功!');
                                        return;
                                    }
                                    
                                    if (data.error || data.error_code) {
                                        log(`\n❌ API错误: ${data.message || data.error}`);
                                        updateStatus('error', 'API错误');
                                        return;
                                    }
                                } catch (e) {
                                    if (e instanceof SyntaxError) {
                                        log(`解析JSON失败: ${line}`);
                                    } else {
                                        throw e;
                                    }
                                }
                            }
                        }
                    }
                }
            } catch (error) {
                log(`\n❌ 网络错误!`);
                log(`错误类型: ${error.name}`);
                log(`错误信息: ${error.message}`);
                log(`堆栈跟踪: ${error.stack}`);
                updateStatus('error', `网络错误: ${error.message}`);
            } finally {
                sendBtn.disabled = false;
                btnText.innerHTML = '<span>🚀</span> 发送测试';
            }
        }
        
        // 页面加载完成后自动执行一次测试
        window.addEventListener('load', () => {
            setTimeout(() => {
                log('页面加载完成，可以直接点击"发送测试"按钮开始测试');
            }, 500);
        });
    </script>
</body>
</html>
